name: Project CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Compile Python sources
        run: |
          python -m py_compile demo/app.py scripts/check_project.py scripts/run_demo_cases.py scripts/check_accuracy_preserving.py scripts/check_final_deliverables.py scripts/make_submission_package.py

      - name: Run project smoke checks
        run: |
          python scripts/check_project.py
          python scripts/run_demo_cases.py
          python scripts/check_accuracy_preserving.py
          python scripts/check_final_deliverables.py

      - name: Run pytest
        run: |
          pytest -q
